<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="www.feedback.title">反馈与支持 - ccLoad</title>
  <meta name="description" content="ccLoad 反馈与支持">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <script src="assets/js/theme-init.js"></script>
  <link rel="stylesheet" href="assets/css/www.css">

  <script defer src="assets/locales/zh-CN.js"></script>
  <script defer src="assets/locales/en.js"></script>
  <script defer src="assets/js/i18n.js"></script>
  <script defer src="assets/js/nav.js"></script>
  <script defer src="assets/js/www.js"></script>
</head>
<body class="www-page www-feedback">
  <main class="www-main">
    <div class="www-content">
      <h1 style="margin: 4rem 0 2rem; text-align: center;" data-i18n="www.feedback.title">反馈与支持</h1>

      <section style="max-width: 800px; margin: 0 auto;">
        <div style="margin-bottom: 3rem;">
          <h2 style="margin-bottom: 1rem;">GitHub Issues</h2>
          <p style="color: var(--color-text-secondary); margin-bottom: 1rem;">
            报告 Bug、提出功能建议
          </p>
          <a href="https://github.com/caidaoli/ccLoad/issues" target="_blank" rel="noopener" class="www-btn www-btn-primary">
            前往 Issues
          </a>
        </div>

        <div style="margin-bottom: 3rem;">
          <h2 style="margin-bottom: 1rem;">GitHub Discussions</h2>
          <p style="color: var(--color-text-secondary); margin-bottom: 1rem;">
            讨论使用问题、分享经验
          </p>
          <a href="https://github.com/caidaoli/ccLoad/discussions" target="_blank" rel="noopener" class="www-btn www-btn-primary">
            前往 Discussions
          </a>
        </div>

        <div style="margin-bottom: 3rem;">
          <h2 style="margin-bottom: 1rem;">⭐ Star 支持</h2>
          <p style="color: var(--color-text-secondary); margin-bottom: 1rem;">
            如果 ccLoad 对你有帮助，欢迎点个 Star 支持！
          </p>
          <a href="https://github.com/caidaoli/ccLoad" target="_blank" rel="noopener" class="www-btn www-btn-primary">
            前往 GitHub
          </a>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
