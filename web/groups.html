<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/web/favicon.ico">
  <link rel="apple-touch-icon" href="/web/apple-touch-icon.png">
  <link rel="manifest" href="/web/manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <title data-i18n="groups.title">模型管理 - Claude Code & Codex Proxy</title>
  <link rel="stylesheet" href="/web/assets/css/styles.css?v=__VERSION__">
  <style>
    .groups-modal-content {
      width: min(1200px, 96vw);
      max-width: min(1200px, 96vw);
      max-height: 92vh;
      overflow: hidden;
    }

    .groups-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: calc(92vh - 88px);
      overflow: auto;
      padding-right: 4px;
    }

    .groups-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .groups-mode-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .groups-mode-button {
      border: 1px solid var(--neutral-200);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.82);
      color: var(--neutral-700);
      padding: 12px 14px;
      text-align: center;
      font-weight: var(--font-medium);
      cursor: pointer;
      transition: border-color var(--duration-fast), box-shadow var(--duration-fast), background var(--duration-fast), color var(--duration-fast), transform var(--duration-fast);
    }

    .groups-mode-button:hover {
      transform: translateY(-1px);
      border-color: var(--primary-300);
      box-shadow: var(--shadow-sm);
    }

    .groups-mode-button.is-active {
      background: var(--primary-50);
      border-color: var(--primary-500);
      color: var(--primary-700);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.12);
    }

    .groups-editor-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
      gap: 16px;
      min-height: 440px;
      overflow: hidden;
    }

    .groups-form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: auto;
      padding-top: 8px;
      position: sticky;
      bottom: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.96) 24px, rgba(255, 255, 255, 0.96) 100%);
      z-index: 1;
    }

    .groups-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: var(--space-5);
      gap: 12px;
    }

    .groups-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .groups-panel-title {
      margin: 0;
      font-size: var(--text-lg);
    }

    .groups-panel-count {
      margin-left: 6px;
      color: var(--neutral-500);
      font-size: var(--text-sm);
      font-weight: var(--font-normal);
    }

    .groups-panel-hint {
      margin: 6px 0 0;
      color: var(--neutral-500);
      font-size: var(--text-sm);
    }

    .groups-panel-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 4px;
    }

    .groups-help {
      margin-top: 6px;
      color: var(--neutral-500);
      font-size: var(--text-xs);
      line-height: 1.5;
    }

    .groups-channel-block {
      border: 1px solid var(--neutral-200);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.7);
      overflow: hidden;
    }

    .groups-channel-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      cursor: pointer;
      list-style: none;
      font-weight: var(--font-semibold);
    }

    .groups-channel-summary::-webkit-details-marker {
      display: none;
    }

    .groups-channel-count {
      color: var(--neutral-500);
      font-size: var(--text-sm);
      font-weight: var(--font-normal);
    }

    .groups-channel-models {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .groups-model-button {
      width: 100%;
      border: 1px solid var(--neutral-200);
      border-radius: var(--radius-base);
      background: #fff;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      text-align: left;
      cursor: pointer;
      transition: transform var(--duration-fast), box-shadow var(--duration-fast), border-color var(--duration-fast);
    }

    .groups-model-button:hover {
      transform: translateY(-1px);
      border-color: var(--primary-300);
      box-shadow: var(--shadow-sm);
    }

    .groups-model-button.is-selected {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .groups-picker-toolbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
    }

    .groups-picker-label {
      min-width: 0;
      justify-self: start;
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--neutral-800);
    }

    .groups-search-box {
      position: relative;
      width: min(220px, 100%);
      justify-self: center;
    }

    .groups-search-box::before {
      content: '⌕';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--neutral-400);
      font-size: 12px;
      pointer-events: none;
    }

    .groups-search-input {
      height: 28px;
      padding-left: 28px;
      padding-right: 10px;
      font-size: 12px;
    }

    .groups-model-main {
      min-width: 0;
    }

    .groups-model-name {
      display: block;
      font-weight: var(--font-semibold);
      color: var(--neutral-800);
      word-break: break-word;
    }

    .groups-model-channel {
      display: block;
      margin-top: 4px;
      color: var(--neutral-500);
      font-size: var(--text-xs);
    }

    .groups-selected-empty {
      padding: 18px;
      border: 1px dashed var(--neutral-300);
      border-radius: var(--radius-lg);
      color: var(--neutral-500);
      text-align: center;
    }

    .groups-selected-item {
      border: 1px solid var(--neutral-200);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.78);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .groups-selected-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .groups-selected-main {
      min-width: 0;
    }

    .groups-selected-name {
      margin: 0;
      font-size: var(--text-base);
      font-weight: var(--font-semibold);
      word-break: break-word;
    }

    .groups-selected-channel {
      margin-top: 4px;
      color: var(--neutral-500);
      font-size: var(--text-xs);
    }

    .groups-priority-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 60px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      background: var(--primary-50);
      color: var(--primary-700);
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      white-space: nowrap;
    }

    .groups-selected-controls {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
    }

    .groups-selected-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .groups-drag-handle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: var(--radius-base);
      color: var(--neutral-400);
      cursor: grab;
      user-select: none;
      transition: background var(--duration-fast), color var(--duration-fast);
      font-size: 14px;
      line-height: 1;
      letter-spacing: -2px;
    }

    .groups-drag-handle:hover {
      background: var(--neutral-100);
      color: var(--neutral-600);
    }

    .groups-selected-item[draggable="true"] {
      cursor: grab;
    }

    .groups-selected-item.is-dragging {
      opacity: 0.55;
      border-color: var(--primary-300);
      box-shadow: var(--shadow-md);
    }

    .groups-weight-input {
      width: 56px;
      height: 28px;
      text-align: center;
      font-size: 12px;
      padding: 0 6px;
    }

    .groups-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .groups-meta-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: var(--radius-full);
      background: var(--neutral-100);
      color: var(--neutral-700);
      font-size: var(--text-xs);
    }

    @media (max-width: 900px) {
      .groups-form-grid,
      .groups-mode-grid,
      .groups-editor-grid,
      .groups-selected-controls {
        grid-template-columns: 1fr;
      }

      .groups-editor-grid {
        min-height: 0;
      }

      .groups-modal-content {
        width: min(96vw, 96vw);
        max-height: 96vh;
      }

      .groups-form {
        max-height: calc(96vh - 88px);
      }
    }
  </style>
  <script defer src="/web/assets/locales/zh-CN.js?v=__VERSION__"></script>
  <script defer src="/web/assets/locales/en.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/i18n.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/ui.js?v=__VERSION__"></script>
  <script defer src="/web/assets/js/groups.js?v=__VERSION__"></script>
</head>

<body>
  <div class="app-container">
    <main class="main-content">
      <div class="content-area">
        <header class="mt-2 mb-2">
          <div class="glass-card" style="padding: var(--space-6);">
            <div class="channel-page-hero">
              <p class="page-subtitle" style="margin: 0;" data-i18n="groups.description">
                把多个渠道里的真实模型挂到同一个模型名下，并把失败冷却隔离到渠道 + 模型级别。
              </p>
              <div class="channel-page-actions">
                <button id="addGroupBtn" type="button" class="btn btn-primary" data-action="show-add-group">
                  <span data-i18n="groups.add">+ 添加模型</span>
                </button>
              </div>
            </div>
          </div>
        </header>

        <section>
          <div id="groups-container" class="grid grid-cols-1 gap-6"></div>
        </section>
      </div>
    </main>
  </div>

  <div id="groupModal" class="modal">
    <div class="modal-content modal-content--xl groups-modal-content">
      <div class="modal-header">
        <h2 id="groupModalTitle" class="modal-title" data-i18n="groups.modal.createTitle">添加模型</h2>
        <button type="button" class="close-btn" data-action="close-group-modal" data-i18n-title="common.close" title="关闭">&times;</button>
      </div>
      <form id="groupForm" class="groups-form">
        <div class="groups-form-grid">
          <div class="form-group">
            <label for="groupName" class="form-label" data-i18n="groups.field.name">模型名</label>
            <input id="groupName" type="text" class="form-input" placeholder="gpt-5" required />
          </div>
          <div class="form-group">
            <label for="groupMatchRegex" class="form-label" data-i18n="groups.field.matchRegex">匹配正则</label>
            <input id="groupMatchRegex" type="text" class="form-input" placeholder="^gpt-5(\\.\\d+)?$" />
            <div class="groups-help" data-i18n="groups.hint.matchRegex">填了正则就按正则自动匹配，不填就按模型名模糊匹配。</div>
          </div>
          <div class="form-group">
            <label for="groupFirstTokenTimeout" class="form-label" data-i18n="groups.field.firstTokenTimeout">首包超时（秒）</label>
            <input id="groupFirstTokenTimeout" type="number" class="form-input" min="0" step="1" value="0" />
            <div class="groups-help" data-i18n="groups.hint.firstTokenTimeout">这个模型里的某条渠道太久没开始返回内容，就按你这里的秒数切下一个。</div>
          </div>
          <div class="form-group">
            <label for="groupSessionKeepTime" class="form-label" data-i18n="groups.field.sessionKeepTime">会话保持（秒）</label>
            <input id="groupSessionKeepTime" type="number" class="form-input" min="0" step="1" value="0" />
            <div class="groups-help" data-i18n="groups.hint.sessionKeepTime">同一个令牌短时间内尽量继续命中上次成功的渠道。</div>
          </div>
        </div>

        <div class="form-group">
          <label for="groupMode" class="form-label" data-i18n="groups.field.routeMode">路由模式</label>
          <input id="groupMode" type="hidden" value="3" />
          <div id="groupModeButtons" class="groups-mode-grid">
            <button type="button" class="groups-mode-button" data-action="select-group-mode" data-mode="1">
              <span data-i18n="groups.mode.roundRobin">轮询</span>
            </button>
            <button type="button" class="groups-mode-button" data-action="select-group-mode" data-mode="2">
              <span data-i18n="groups.mode.random">随机</span>
            </button>
            <button type="button" class="groups-mode-button is-active" data-action="select-group-mode" data-mode="3">
              <span data-i18n="groups.mode.failover">故障转移</span>
            </button>
            <button type="button" class="groups-mode-button" data-action="select-group-mode" data-mode="4">
              <span data-i18n="groups.mode.weighted">加权</span>
            </button>
          </div>
        </div>

        <div class="groups-editor-grid">
          <section id="groupPickerPanel" class="glass-card groups-panel">
            <div class="groups-panel-header">
              <div class="groups-picker-toolbar">
                <span class="groups-picker-label" data-i18n="groups.actions.addItem">添加成员</span>
                <div class="groups-search-box">
                  <input id="groupModelSearch" type="text" class="form-input groups-search-input" placeholder="gpt-5.4" aria-label="搜索模型" />
                </div>
                <button id="groupAutoAddBtn" type="button" class="btn btn-secondary btn-sm" data-action="auto-add-group-items">
                  <span data-i18n="groups.actions.autoAdd">自动添加</span>
                </button>
              </div>
            </div>
            <div class="groups-panel-hint" data-i18n="groups.field.searchModelsHint">
              左边挑模型，支持搜索和一键自动加成员。
            </div>
            <div id="groupPickerList" class="groups-panel-body"></div>
          </section>

          <section id="groupSelectedPanel" class="glass-card groups-panel">
            <div class="groups-panel-header">
              <div>
                <h3 class="groups-panel-title">
                  <span data-i18n="groups.field.items">模型成员</span>
                  <span id="groupSelectedCount" class="groups-panel-count">(0)</span>
                </h3>
                <p id="groupSelectedSummary" class="groups-panel-hint" data-i18n="groups.hint.priorityAuto">右边顺序就是优先级，第 1 个最先尝试。</p>
              </div>
              <button id="groupClearBtn" type="button" class="btn btn-secondary btn-sm" data-action="clear-group-items">
                <span data-i18n="common.clear">清空</span>
              </button>
            </div>
            <div id="groupSelectedList" class="groups-panel-body"></div>
          </section>
        </div>
        <div class="groups-form-actions">
          <button type="button" class="btn btn-secondary" data-action="close-group-modal" data-i18n="common.cancel">取消</button>
          <button type="submit" class="btn btn-primary" data-i18n="common.save">保存</button>
        </div>
      </form>
    </div>
  </div>
</body>

</html>
