name: Build Docker Runtime Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '手动指定镜像标签'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Test runtime entrypoint
        run: sh docker/entrypoint_test.sh

      - name: Prepare runtime image context
        run: |
          context_dir="${{ runner.temp }}/ccload-runtime-image"
          mkdir -p "$context_dir"

          cat > "$context_dir/Dockerfile" <<'EOF'
          FROM alpine:3.21

          RUN apk add --no-cache ca-certificates curl tzdata && \
              addgroup -g 1001 -S ccload && \
              adduser -u 1001 -S ccload -G ccload && \
              mkdir -p /app/data && \
              chown -R ccload:ccload /app

          WORKDIR /app

          COPY entrypoint.sh /usr/local/bin/entrypoint.sh
          RUN chmod +x /usr/local/bin/entrypoint.sh

          USER ccload

          EXPOSE 8080

          ENV PORT=8080 \
              SQLITE_PATH=/app/data/ccload.db \
              GIN_MODE=release \
              TZ=Asia/Shanghai

          HEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \
              CMD curl -fsS http://localhost:8080/health >/dev/null || exit 1

          ENTRYPOINT ["/usr/local/bin/entrypoint.sh"]
          EOF

          cp docker/entrypoint.sh "$context_dir/entrypoint.sh"
          chmod +x "$context_dir/entrypoint.sh"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' && github.event.inputs.tag != 'latest' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ runner.temp }}/ccload-runtime-image
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=docker-runtime
          cache-to: type=gha,scope=docker-runtime,mode=max

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ steps.meta.outputs.version }}
